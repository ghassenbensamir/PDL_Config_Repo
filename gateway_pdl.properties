
spring.application.name=gateway_pdl
server.port=8089
spring.cloud.config.enabled=true
eureka.client.service-url.defaultZone=http://discovery:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true


# Dynamic Routing via Eureka (properties compatibles 2025.x)
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# Actuator (monitoring)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG

#keycloack
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/quiz-live
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8080/realms/quiz-live/protocol/openid-connect/certs
jwt.auth.converter.resource-id=quiz-live-app
jwt.auth.converter.principal-attribute=preferred_username



spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET, POST, PUT, DELETE, OPTIONS, PATCH
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.corsConfigurations.[/**].maxAge=3600


