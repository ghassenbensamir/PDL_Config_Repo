server.port=8086
spring.application.name=ai-generator-ms
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=llama3.2:1b
spring.ai.ollama.chat.options.temperature=0.3
spring.ai.ollama.chat.options.num-predict=2048
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
quiz-library.base-url=http://localhost:8089/quizlibraryms
rabbitmq.exchange=quizlive.events
rabbitmq.routing-keys.quiz-generated=quiz.generated
upload.temp-dir=/tmp/ai-generator-uploads
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
management.endpoints.web.exposure.include=health,info,metrics
